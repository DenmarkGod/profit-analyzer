<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ Карта API МойСклад</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
        .mono { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
            <h1 class="text-2xl font-bold mb-2 text-blue-400">🗺️ Карта доступных путей API</h1>
            <p class="text-gray-400 text-sm">Этот скрипт не гадает. Он спрашивает у API МойСклад полный список доступных сущностей и отчетов.</p>
        </div>

        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Токен API</label>
                <input type="text" id="apiToken" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white mono text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Введите токен...">
            </div>
            <button onclick="buildApiMap()" id="runBtn" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg transition">
                🗺️ Построить карту API
            </button>
        </div>

        <div id="results" class="space-y-6"></div>
    </div>

    <script>
        const PROXY_URL = 'https://moysklad-proxy.helsinkyofficial.workers.dev';

        function getSafeHeaders(token) {
            token = token.trim();
            let authValue = token;
            if (!token.startsWith("Basic ") && !token.startsWith("Bearer ")) {
                authValue = token.includes(":") ? "Basic " + btoa(unescape(encodeURIComponent(token))) : "Bearer " + token;
            }
            return {
                "Authorization": authValue,
                "Accept": "application/json;charset=utf-8",
                "Content-Type": "application/json"
            };
        }

        async function fetchWithTimeout(url, options, timeout = 8000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const separator = url.includes('?') ? '&' : '?';
                const response = await fetch(`${url}${separator}_t=${Date.now()}`, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                if (error.name === 'AbortError') {
                    return { status: 408, ok: false, text: () => Promise.resolve('{"error": "Таймаут"}') };
                }
                throw error;
            }
        }

        async function buildApiMap() {
            const token = document.getElementById('apiToken').value;
            if (!token) return alert('Введите токен!');

            const btn = document.getElementById('runBtn');
            const resultsDiv = document.getElementById('results');
            btn.disabled = true;
            btn.innerHTML = '⏳ Запрос структуры API...';
            resultsDiv.innerHTML = '';

            const headers = getSafeHeaders(token);

            try {
                // 1. Запрашиваем все доступные СУЩНОСТИ
                resultsDiv.innerHTML += `<div class="text-yellow-400 font-bold mb-2">📌 Запрос списка сущностей (/entity)...</div>`;
                const entityRes = await fetchWithTimeout(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: 'https://api.moysklad.ru/api/remap/1.2/entity', headers: headers, method: 'GET' })
                });
                
                let entities = [];
                if (entityRes.ok) {
                    const entityData = await entityRes.json();
                    if (entityData.meta && entityData.meta.type === 'entity') {
                        // МойСклад возвращает мета-информацию, извлекаем пути
                        // Обычно это объект, где ключи - это типы сущностей
                        // Но надежнее проверить, есть ли там список
                        entities = Object.keys(entityData).filter(k => k !== 'meta' && k !== 'context');
                    }
                }

                // 2. Запрашиваем все доступные ОТЧЕТЫ
                resultsDiv.innerHTML += `<div class="text-yellow-400 font-bold mb-2">📌 Запрос списка отчетов (/report)...</div>`;
                const reportRes = await fetchWithTimeout(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: 'https://api.moysklad.ru/api/remap/1.2/report', headers: headers, method: 'GET' })
                });

                let reports = [];
                if (reportRes.ok) {
                    const reportData = await reportRes.json();
                    if (reportData.meta && reportData.meta.type === 'report') {
                        reports = Object.keys(reportData).filter(k => k !== 'meta' && k !== 'context');
                    }
                }

                // Отображение результатов
                let html = '';
                
                // Если получили данные по сущностям
                if (entities.length > 0) {
                    html += `
                        <div class="bg-slate-800 border border-slate-700 rounded-xl p-6">
                            <h3 class="text-xl font-bold mb-4 text-green-400">✅ Доступные СУЩНОСТИ (Entities)</h3>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                ${entities.map(e => `<div class="bg-slate-900 p-2 rounded mono text-xs text-blue-300 border border-slate-700">entity/${e}</div>`).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    html += `<div class="bg-red-900/20 border border-red-700 rounded-xl p-4 text-red-400">Не удалось получить список сущностей. Статус: ${entityRes.status}</div>`;
                }

                // Если получили данные по отчетам
                if (reports.length > 0) {
                    html += `
                        <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 mt-6">
                            <h3 class="text-xl font-bold mb-4 text-purple-400">✅ Доступные ОТЧЕТЫ (Reports)</h3>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                ${reports.map(r => `<div class="bg-slate-900 p-2 rounded mono text-xs text-purple-300 border border-slate-700">report/${r}</div>`).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    html += `<div class="bg-red-900/20 border border-red-700 rounded-xl p-4 text-red-400 mt-6">Не удалось получить список отчетов. Статус: ${reportRes.status}. Возможно, отчеты скрыты настройками прав.</div>`;
                }

                // Добавим сырой ответ для анализа, если что-то пошло не так
                html += `
                    <details class="mt-6 bg-slate-900 border border-slate-700 rounded-xl p-4">
                        <summary class="cursor-pointer text-blue-400 font-bold">🔍 Показать сырые JSON-ответы (для анализа)</summary>
                        <div class="mt-4 space-y-4">
                            <div>
                                <div class="text-xs text-gray-500 mb-1">Ответ /entity:</div>
                                <pre class="mono text-xs text-gray-300 bg-slate-950 p-3 rounded overflow-x-auto max-h-60">${JSON.stringify(await entityRes.json().catch(() => 'Error parsing'), null, 2)}</pre>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500 mb-1">Ответ /report:</div>
                                <pre class="mono text-xs text-gray-300 bg-slate-950 p-3 rounded overflow-x-auto max-h-60">${JSON.stringify(await reportRes.json().catch(() => 'Error parsing'), null, 2)}</pre>
                            </div>
                        </div>
                    </details>
                `;

                resultsDiv.innerHTML = html;

            } catch (error) {
                resultsDiv.innerHTML = `<div class="bg-red-900/20 border border-red-700 rounded-xl p-4 text-red-400">Ошибка: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🗺️ Построить карту API';
            }
        }
    </script>
</body>
</html>
