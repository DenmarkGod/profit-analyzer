<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 Финальная проверка подключения</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
        .mono { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto space-y-6">
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
            <h1 class="text-2xl font-bold mb-2 text-blue-400">🔧 Финальная проверка подключения</h1>
            <p class="text-gray-400 text-sm">Этот скрипт исправляет проблему с кодировкой русских букв в пароле и проверяет базовое подключение.</p>
        </div>

        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Токен или Логин:Пароль</label>
                <input type="text" id="apiToken" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white mono text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="например: user@domain.com:password или длинный токен">
                <p class="text-xs text-gray-500 mt-2">💡 Подсказка: Если вы используете Логин и Пароль, введите их через двоеточие (без пробелов).</p>
            </div>
            <button onclick="runFinalCheck()" id="runBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg transition">
                🚀 Проверить подключение
            </button>
        </div>

        <div id="results" class="space-y-4"></div>
    </div>

    <script>
        const PROXY_URL = 'https://moysklad-proxy.helsinkyofficial.workers.dev';

        // ИСПРАВЛЕНИЕ: Безопасное кодирование Base64 с поддержкой кириллицы
        function getSafeHeaders(token) {
            token = token.trim();
            let authValue = "";
            
            if (token.startsWith("Basic ") || token.startsWith("Bearer ")) {
                authValue = token;
            } else if (token.includes(":")) {
                // Это формат логин:пароль. Используем unescape(encodeURIComponent) для поддержки русских букв
                try {
                    authValue = "Basic " + btoa(unescape(encodeURIComponent(token)));
                } catch (e) {
                    console.error("Ошибка кодирования:", e);
                    authValue = "Bearer " + token;
                }
            } else {
                // Предполагаем, что это OAuth токен
                authValue = "Bearer " + token;
            }

            return {
                "Authorization": authValue,
                "Accept": "application/json;charset=utf-8",
                "Content-Type": "application/json"
            };
        }

        async function runFinalCheck() {
            const token = document.getElementById('apiToken').value;
            if (!token) return alert('Введите токен или логин:пароль!');

            const btn = document.getElementById('runBtn');
            const resultsDiv = document.getElementById('results');
            btn.disabled = true;
            btn.innerHTML = '⏳ Проверка...';
            resultsDiv.innerHTML = '';

            const headers = getSafeHeaders(token);

            // Показываем, какой заголовок мы отправляем (скрывая часть данных для безопасности)
            const safeAuth = headers.Authorization.length > 20 ? headers.Authorization.substring(0, 20) + '...' : headers.Authorization;
            resultsDiv.innerHTML += `
                <div class="bg-slate-900 p-4 rounded border border-slate-700">
                    <div class="text-xs text-gray-500 mb-1">Отправляемый заголовок Authorization:</div>
                    <div class="mono text-sm text-green-400 break-all">${safeAuth}</div>
                </div>
            `;

            try {
                // Тест 1: Самый базовый и надежный эндпоинт
                resultsDiv.innerHTML += `<div class="text-yellow-400 py-2">📌 Тест 1: Проверка организации (entity/organization)...</div>`;
                
                const res1 = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        url: 'https://api.moysklad.ru/api/remap/1.2/entity/organization?limit=1', 
                        headers: headers, 
                        method: 'GET' 
                    })
                });

                const text1 = await res1.text();
                let json1 = null;
                try { json1 = JSON.parse(text1); } catch(e) {}

                if (res1.ok && json1 && json1.rows && json1.rows.length > 0) {
                    resultsDiv.innerHTML += `
                        <div class="bg-green-900/20 border border-green-700 p-4 rounded mb-4">
                            <div class="font-bold text-green-400 text-lg mb-2">✅ ПОДКЛЮЧЕНИЕ УСПЕШНО!</div>
                            <p class="text-sm text-gray-300">Токен рабочий, прокси работает. Мы получили данные организации: <b>${json1.rows[0].name}</b></p>
                            <p class="text-sm text-blue-400 mt-3">🎉 Теперь мы точно знаем, что проблема была в кодировке пароля. Основной код сайта будет работать.</p>
                        </div>
                    `;
                    
                    // Тест 2: Пробуем отчет, теперь, когда мы уверены в токене
                    resultsDiv.innerHTML += `<div class="text-yellow-400 py-2">📌 Тест 2: Проверка отчета Продажи (report/sales)...</div>`;
                    const res2 = await fetch(PROXY_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            url: 'https://api.moysklad.ru/api/remap/1.2/report/sales?limit=1', 
                            headers: headers, 
                            method: 'GET' 
                        })
                    });
                    const text2 = await res2.text();
                    
                    if (res2.ok) {
                        resultsDiv.innerHTML += `<div class="bg-green-900/20 border border-green-700 p-4 rounded"><div class="font-bold text-green-400">✅ Отчет /report/sales также доступен!</div></div>`;
                    } else {
                        resultsDiv.innerHTML += `
                            <div class="bg-yellow-900/20 border border-yellow-700 p-4 rounded">
                                <div class="font-bold text-yellow-400 mb-2">⚠️ Отчет /report/sales недоступен (${res2.status})</div>
                                <p class="text-sm text-gray-300">Это означает, что у вашего сотрудника в настройках МойСклад <b>не стоит галочка "Отчеты"</b>.</p>
                                <p class="text-sm text-gray-300 mt-2">Решение: Зайдите в МойСклад → Настройки → Сотрудники → Ваш сотрудник → Права → Поставьте галочку "Отчеты" (или "Полный доступ").</p>
                                <details class="mt-2"><summary class="cursor-pointer text-blue-400 text-sm">Показать ответ сервера</summary><pre class="text-xs text-gray-400 mt-1 bg-slate-900 p-2 rounded">${text2}</pre></details>
                            </div>
                        `;
                    }

                } else {
                    resultsDiv.innerHTML += `
                        <div class="bg-red-900/20 border border-red-700 p-4 rounded mb-4">
                            <div class="font-bold text-red-400 text-lg mb-2">❌ ОШИБКА АВТОРИЗАЦИИ ИЛИ ДОСТУПА</div>
                            <p class="text-sm text-gray-300 mb-2">Сервер вернул статус: ${res1.status}</p>
                            <details><summary class="cursor-pointer text-blue-400 text-sm mb-2">Показать полный ответ сервера</summary><pre class="text-xs text-gray-400 bg-slate-900 p-2 rounded break-all">${text1}</pre></details>
                            <p class="text-sm text-gray-300 mt-3">💡 Возможные причины:</p>
                            <ul class="list-disc list-inside text-sm text-gray-400 mt-1">
                                <li>Неверный логин или пароль (проверьте раскладку и пробелы).</li>
                                <li>Если это токен, возможно, он отозван или создан без прав API.</li>
                            </ul>
                        </div>
                    `;
                }

            } catch (error) {
                resultsDiv.innerHTML += `
                    <div class="bg-red-900/20 border border-red-700 p-4 rounded">
                        <div class="font-bold text-red-400 text-lg mb-2">❌ ОШИБКА СЕТИ ИЛИ ПРОКСИ</div>
                        <p class="text-sm text-gray-300">${error.message}</p>
                        <p class="text-sm text-gray-400 mt-2">Проверьте, что URL прокси-сервера верный и Cloudflare Worker активен.</p>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 Проверить подключение';
            }
        }
    </script>
</body>
</html>
