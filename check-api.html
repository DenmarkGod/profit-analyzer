<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проверка путей API МойСклад</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #0f172a; color: white; font-family: monospace; padding: 20px; }</style>
</head>
<body class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold mb-6 text-blue-400">🔍 Проверка доступных путей API</h1>
    
    <div class="mb-6">
        <label class="block text-sm mb-2 text-gray-400">Ваш токен МойСклад:</label>
        <input type="text" id="token" class="w-full p-3 bg-slate-800 border border-slate-700 rounded text-white mb-4" placeholder="Вставьте токен сюда">
        <button onclick="checkPaths()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded transition">
            🚀 Проверить пути
        </button>
    </div>

    <div id="results" class="space-y-4"></div>

    <script>
        const PROXY_URL = 'https://moysklad-proxy.helsinkyofficial.workers.dev';

        function getHeaders(token) {
            token = token.trim();
            let auth = token;
            if (!token.startsWith("Basic ") && !token.startsWith("Bearer ")) {
                auth = token.includes("@") ? `Basic ${btoa(token)}` : `Bearer ${token}`;
            }
            return {
                "Authorization": auth,
                "Accept": "application/json;charset=utf-8",
                "Content-Type": "application/json"
            };
        }

        async function testEndpoint(name, path) {
            const resultDiv = document.getElementById('results');
            const item = document.createElement('div');
            item.className = "bg-slate-800 p-4 rounded border border-slate-700";
            item.innerHTML = `<div class="font-bold text-lg mb-2">📌 ${name}</div><div class="text-gray-400 mb-2">Путь: ${path}</div><div class="text-yellow-400">⏳ Проверка...</div>`;
            resultDiv.appendChild(item);

            try {
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: `https://api.moysklad.ru/api/remap/1.2/${path}`,
                        headers: getHeaders(document.getElementById('token').value),
                        method: 'GET'
                    })
                });

                const text = await response.text();
                let statusColor = response.ok ? 'text-green-400' : 'text-red-400';
                let statusText = response.ok ? '✅ ДОСТУПЕН (200 OK)' : `❌ НЕДОСТУПЕН (${response.status})`;
                
                item.innerHTML = `
                    <div class="font-bold text-lg mb-2">📌 ${name}</div>
                    <div class="text-gray-400 mb-2">Путь: ${path}</div>
                    <div class="${statusColor} font-bold text-xl mb-2">${statusText}</div>
                    <details class="text-sm text-gray-300 bg-slate-900 p-2 rounded">
                        <summary class="cursor-pointer text-blue-400">Показать ответ сервера</summary>
                        <pre class="mt-2 whitespace-pre-wrap break-all">${text}</pre>
                    </details>
                `;
            } catch (error) {
                item.innerHTML = `
                    <div class="font-bold text-lg mb-2">📌 ${name}</div>
                    <div class="text-gray-400 mb-2">Путь: ${path}</div>
                    <div class="text-red-400 font-bold text-xl">❌ ОШИБКА СЕТИ</div>
                    <div class="text-sm text-gray-300 mt-2">${error.message}</div>
                `;
            }
        }

        async function checkPaths() {
            const token = document.getElementById('token').value;
            if (!token) return alert('Введите токен!');
            
            document.getElementById('results').innerHTML = '';
            
            // Проверяем 4 ключевых направления
            await testEndpoint('1. Справочник сущностей (База)', 'entity');
            await testEndpoint('2. Список доступных отчетов', 'report');
            await testEndpoint('3. Отчет по продажам (Sales)', 'report/sales?limit=1');
            await testEndpoint('4. Отчет о прибыльности (Profit)', 'report/profit?limit=1');
            await testEndpoint('5. Розничные продажи (Чеки)', 'entity/retaildemand?limit=1');
            await testEndpoint('6. Остатки по товарам', 'stock/byproduct?limit=1');
        }
    </script>
</body>
</html>
