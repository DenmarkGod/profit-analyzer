<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Умная диагностика API МойСклад</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
        .mono { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
            <h1 class="text-2xl md:text-3xl font-bold mb-2 text-blue-400">🔍 Умная диагностика API</h1>
            <p class="text-gray-400 text-sm md:text-base">Этот инструмент не зависнет. Он проверит метаданные (полный список доступных функций) и 6 ключевых путей с таймаутом 5 секунд.</p>
        </div>

        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Токен API МойСклад</label>
                <input type="text" id="apiToken" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white mono text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Введите токен...">
            </div>
            <button onclick="runSmartDiagnostic()" id="runBtn" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg transition flex items-center justify-center gap-2">
                <span>🚀</span> Запустить умную диагностику
            </button>
        </div>

        <div id="results" class="space-y-4"></div>
    </div>

    <script>
        const PROXY_URL = 'https://moysklad-proxy.helsinkyofficial.workers.dev';

        function getHeaders(token) {
            token = token.trim();
            let auth = token;
            if (!token.startsWith("Basic ") && !token.startsWith("Bearer ")) {
                auth = token.includes("@") ? `Basic ${btoa(token)}` : `Bearer ${token}`;
            }
            return {
                "Authorization": auth,
                "Accept": "application/json;charset=utf-8",
                "Content-Type": "application/json"
            };
        }

        // Функция запроса с жестким таймаутом, чтобы ничего не зависало
        async function fetchWithTimeout(url, options, timeout = 5000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                // Добавляем _t= для обхода QUIC ошибок (как в техническом отчете)
                const separator = url.includes('?') ? '&' : '?';
                const finalUrl = `${url}${separator}_t=${Date.now()}`;
                
                const response = await fetch(finalUrl, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                if (error.name === 'AbortError') {
                    return { status: 408, ok: false, text: () => Promise.resolve('{"error": "Таймаут: сервер не ответил за 5 секунд"}') };
                }
                throw error;
            }
        }

        async function runSmartDiagnostic() {
            const token = document.getElementById('apiToken').value;
            if (!token) return alert('Пожалуйста, введите токен!');

            const btn = document.getElementById('runBtn');
            const resultsDiv = document.getElementById('results');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Анализ...';
            resultsDiv.innerHTML = '<div class="text-center py-8 text-blue-400">⏳ Запрос метаданных и ключевых путей...</div>';

            const headers = getHeaders(token);

            try {
                // ШАГ 1: ГЛАВНЫЙ КЛЮЧ - ЗАПРОС METADATA
                // Этот один запрос скажет нам ВСЁ, к чему у токена есть доступ
                resultsDiv.innerHTML += `<div class="bg-slate-800 p-4 rounded border border-slate-700"><div class="font-bold text-blue-400 mb-2">📌 Шаг 1: Проверка глобальных прав (Metadata)</div><div class="text-yellow-400">Загрузка...</div></div>`;
                
                const metaRes = await fetchWithTimeout(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: 'https://api.moysklad.ru/api/remap/1.2/metadata', headers: headers, method: 'GET' })
                });

                const metaText = await metaRes.text();
                let metaJson = null;
                try { metaJson = JSON.parse(metaText); } catch(e) {}

                let metaHtml = '';
                if (metaRes.ok && metaJson) {
                    // Проверяем, есть ли отчеты в метаданных
                    const hasReports = metaJson.meta && metaJson.meta.href && metaJson.meta.href.includes('metadata');
                    // Ищем конкретно report/sales в ответе (упрощенная проверка)
                    const metaStr = JSON.stringify(metaJson);
                    const hasSalesReport = metaStr.includes('report/sales');
                    const hasProfitReport = metaStr.includes('report/profit');

                    metaHtml = `
                        <div class="bg-green-900/20 border border-green-700 p-4 rounded">
                            <div class="font-bold text-green-400 text-lg mb-2">✅ Metadata успешно загружена!</div>
                            <p class="text-sm text-gray-300 mb-2">Токен рабочий. Теперь проверим наличие конкретных отчетов:</p>
                            <ul class="list-disc list-inside text-sm space-y-1 mono">
                                <li class="${hasSalesReport ? 'text-green-400' : 'text-red-400'}">Отчет /report/sales: ${hasSalesReport ? 'ДОСТУПЕН' : 'ОТСУТСТВУЕТ (нет прав или тарифа)'}</li>
                                <li class="${hasProfitReport ? 'text-green-400' : 'text-red-400'}">Отчет /report/profit: ${hasProfitReport ? 'ДОСТУПЕН' : 'ОТСУТСТВУЕТ'}</li>
                            </ul>
                        </div>
                    `;
                } else {
                    metaHtml = `<div class="bg-red-900/20 border border-red-700 p-4 rounded text-red-400">❌ Ошибка Metadata: ${metaRes.status}. Ответ: ${metaText.substring(0, 200)}</div>`;
                }

                // ШАГ 2: ТОЧЕЧНАЯ ПРОВЕРКА 6 КЛЮЧЕВЫХ ПУТЕЙ
                resultsDiv.innerHTML = metaHtml + `<div class="font-bold text-blue-400 mt-6 mb-2">📌 Шаг 2: Точечная проверка ключевых путей</div>`;
                
                const criticalPaths = [
                    { name: '1. Отчет Продажи (Sales)', path: 'report/sales?limit=1' },
                    { name: '2. Отчет Деньги (Money)', path: 'report/money?limit=1' },
                    { name: '3. Остатки (Stock)', path: 'stock/byproduct?limit=1' },
                    { name: '4. Розничные продажи', path: 'entity/retaildemand?limit=1' },
                    { name: '5. Справочник товаров', path: 'entity/product?limit=1' },
                    { name: '6. Организация', path: 'entity/organization?limit=1' }
                ];

                for (const item of criticalPaths) {
                    const res = await fetchWithTimeout(PROXY_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: `https://api.moysklad.ru/api/remap/1.2/${item.path}`, headers: headers, method: 'GET' })
                    });
                    
                    const text = await res.text();
                    let statusClass = res.ok ? 'border-green-500 bg-green-900/10' : (res.status === 408 ? 'border-yellow-500 bg-yellow-900/10' : 'border-red-500 bg-red-900/10');
                    let statusText = res.ok ? '✅ 200 OK' : (res.status === 408 ? '⏱️ Таймаут (5 сек)' : `❌ ${res.status} Ошибка`);
                    let textColor = res.ok ? 'text-green-400' : (res.status === 408 ? 'text-yellow-400' : 'text-red-400');

                    resultsDiv.innerHTML += `
                        <div class="${statusClass} border-l-4 p-4 rounded flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                            <div>
                                <div class="font-bold text-white">${item.name}</div>
                                <div class="mono text-xs text-gray-400 mt-1">${item.path}</div>
                            </div>
                            <div class="text-right">
                                <div class="font-bold ${textColor}">${statusText}</div>
                                ${!res.ok ? `<button onclick="this.nextElementSibling.classList.toggle('hidden')" class="text-xs text-blue-400 hover:underline mt-1">Показать ответ</button>
                                <pre class="hidden text-xs text-gray-300 bg-slate-900 p-2 rounded mt-2 max-w-md overflow-x-auto">${text.substring(0, 300)}${text.length > 300 ? '...' : ''}</pre>` : ''}
                            </div>
                        </div>
                    `;
                }

            } catch (error) {
                resultsDiv.innerHTML += `<div class="bg-red-900/20 border border-red-700 p-4 rounded text-red-400">Критическая ошибка сети: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>🚀</span> Запустить умную диагностику';
            }
        }
    </script>
</body>
</html>
