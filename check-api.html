<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API МойСклад - Полный Исследователь</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
        .mono { font-family: 'Fira Code', monospace; }
        .json-key { color: #93c5fd; }
        .json-string { color: #86efac; }
        .json-number { color: #fcd34d; }
        .json-boolean { color: #f472b6; }
        .endpoint-card { transition: all 0.2s; }
        .endpoint-card:hover { transform: translateX(4px); }
        .status-200 { border-left: 4px solid #4ade80; }
        .status-404 { border-left: 4px solid #f87171; }
        .status-403 { border-left: 4px solid #fbbf24; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Заголовок -->
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
            <h1 class="text-3xl font-bold mb-2 text-blue-400">🔬 API МойСклад - Исследователь</h1>
            <p class="text-gray-400">Автоматическое обнаружение всех доступных эндпоинтов и их структуры</p>
        </div>

        <!-- Настройки -->
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Токен API</label>
                <input type="text" id="apiToken" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white mono text-sm" placeholder="Введите токен...">
            </div>
            <div class="flex gap-3">
                <button onclick="startDiscovery()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition">
                    🚀 Начать исследование API
                </button>
                <button onclick="checkMetadata()" class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-6 rounded-lg transition">
                    📋 Проверить Metadata
                </button>
                <button onclick="clearResults()" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 px-6 rounded-lg transition">
                    🗑️ Очистить
                </button>
            </div>
        </div>

        <!-- Результаты -->
        <div id="results" class="space-y-4"></div>
    </div>

    <script>
        const PROXY_URL = 'https://moysklad-proxy.helsinkyofficial.workers.dev';
        
        // Полный список всех возможных эндпоинтов API МойСклад v1.2
        const API_ENDPOINTS = {
            'Базовые': [
                '',
                'metadata',
                'context/companysettings',
                'context/user/settings'
            ],
            'Сущности': [
                'entity/organization',
                'entity/employee',
                'entity/counterparty',
                'entity/customer',
                'entity/supplier',
                'entity/product',
                'entity/productfolder',
                'entity/variant',
                'entity/bundle',
                'entity/uom',
                'entity/country',
                'entity/region',
                'entity/city',
                'entity/district',
                'entity/street',
                'entity/building',
                'entity/account',
                'entity/cashier',
                'entity/store',
                'entity/project',
                'entity/task',
                'entity/customentity'
            ],
            'Документы': [
                'entity/demand',
                'entity/retaildemand',
                'entity/customerorder',
                'entity/invoice',
                'entity/paymentin',
                'entity/paymentout',
                'entity/cashin',
                'entity/cashout',
                'entity/enter',
                'entity/leave',
                'entity/inventory',
                'entity/processing',
                'entity/processingorder',
                'entity/processingplan',
                'entity/assembly',
                'entity/disassembly',
                'entity/commissionreport',
                'entity/internalorder',
                'entity/loss',
                'entity/pricechange',
                'entity/purchaseorder',
                'entity/purchasereturn',
                'entity/purchasespay',
                'entity/salesreturn',
                'entity/stocktake'
            ],
            'Отчеты': [
                'report/profit',
                'report/sales',
                'report/money',
                'report/turnover',
                'report/stock',
                'report/orders',
                'report/salesbycategories',
                'report/salesbyproducts',
                'report/purchases',
                'report/topproducts',
                'report/stockbymaterials',
                'report/stockdetail',
                'report/turnovers',
                'report/ledger',
                'report/balance',
                'report/agentsreport'
            ],
            'Склад': [
                'stock',
                'stock/byproduct',
                'stock/bystore',
                'stock/bymaterial'
            ],
            'Операции': [
                'operation',
                'operation/byentity'
            ]
        };

        function getAuthHeaders(token) {
            token = token.trim();
            let authValue = token;
            if (!token.startsWith("Basic ") && !token.startsWith("Bearer ")) {
                authValue = token.includes("@") ? `Basic ${btoa(token)}` : `Bearer ${token}`;
            }
            return {
                "Authorization": authValue,
                "Accept": "application/json;charset=utf-8",
                "Content-Type": "application/json"
            };
        }

        async function testEndpoint(category, path) {
            const token = document.getElementById('apiToken').value;
            if (!token) return null;

            const headers = getAuthHeaders(token);
            const baseUrl = path ? `https://api.moysklad.ru/api/remap/1.2/${path}` : 'https://api.moysklad.ru/api/remap/1.2';
            const params = path ? '' : '?limit=1';
            
            try {
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: baseUrl + params + (params ? '&' : '?') + 'limit=3',
                        headers: headers,
                        method: 'GET'
                    })
                });

                const text = await response.text();
                let json = null;
                try { json = JSON.parse(text); } catch(e) {}

                return {
                    status: response.status,
                    ok: response.ok,
                    path: path || '(root)',
                    category: category,
                    response: json || text,
                    raw: text
                };
            } catch (error) {
                return {
                    status: 0,
                    ok: false,
                    path: path || '(root)',
                    category: category,
                    error: error.message
                };
            }
        }

        async function startDiscovery() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="text-center py-8 text-blue-400"> Сканирование всех эндпоинтов... Это займет 1-2 минуты</div>';

            const token = document.getElementById('apiToken').value;
            if (!token) {
                alert('Введите токен!');
                return;
            }

            const allResults = [];
            let completed = 0;
            const total = Object.values(API_ENDPOINTS).flat().length;

            for (const [category, endpoints] of Object.entries(API_ENDPOINTS)) {
                for (const endpoint of endpoints) {
                    const result = await testEndpoint(category, endpoint);
                    allResults.push(result);
                    completed++;
                    
                    // Обновляем прогресс
                    if (completed % 10 === 0) {
                        resultsDiv.innerHTML = `<div class="text-center py-4 text-gray-400">Прогресс: ${completed}/${total} (${Math.round(completed/total*100)}%)</div>`;
                    }
                }
            }

            // Группируем результаты
            const working = allResults.filter(r => r.ok);
            const errors = allResults.filter(r => !r.ok);

            displayResults(working, errors, allResults);
        }

        async function checkMetadata() {
            const token = document.getElementById('apiToken').value;
            if (!token) return alert('Введите токен!');

            const headers = getAuthHeaders(token);
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="text-center py-8 text-purple-400">📋 Загрузка метаданных...</div>';

            try {
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: 'https://api.moysklad.ru/api/remap/1.2/metadata',
                        headers: headers,
                        method: 'GET'
                    })
                });

                const data = await response.json();
                
                resultsDiv.innerHTML = `
                    <div class="bg-slate-800 border border-slate-700 rounded-xl p-6">
                        <h3 class="text-xl font-bold mb-4 text-purple-400">📋 Metadata API</h3>
                        <div class="overflow-x-auto">
                            <pre class="mono text-sm bg-slate-900 p-4 rounded-lg overflow-auto max-h-[600px]">${syntaxHighlight(JSON.stringify(data, null, 2))}</pre>
                        </div>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `<div class="bg-red-900/20 border border-red-700 rounded-xl p-6 text-red-400">Ошибка: ${error.message}</div>`;
            }
        }

        function displayResults(working, errors, all) {
            const resultsDiv = document.getElementById('results');
            
            let html = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-green-900/20 border border-green-700 rounded-xl p-6 text-center">
                        <div class="text-3xl font-bold text-green-400">${working.length}</div>
                        <div class="text-sm text-gray-400">Доступных эндпоинтов</div>
                    </div>
                    <div class="bg-red-900/20 border border-red-700 rounded-xl p-6 text-center">
                        <div class="text-3xl font-bold text-red-400">${errors.length}</div>
                        <div class="text-sm text-gray-400">Недоступно (404/403)</div>
                    </div>
                    <div class="bg-blue-900/20 border border-blue-700 rounded-xl p-6 text-center">
                        <div class="text-3xl font-bold text-blue-400">${all.length}</div>
                        <div class="text-sm text-gray-400">Всего проверено</div>
                    </div>
                </div>
            `;

            // Рабочие эндпоинты
            if (working.length > 0) {
                html += '<div class="bg-green-900/10 border border-green-800 rounded-xl p-6 mb-6"><h3 class="text-xl font-bold mb-4 text-green-400">✅ РАБОЧИЕ ЭНДПОИНТЫ</h3><div class="space-y-3">';
                
                const grouped = working.reduce((acc, item) => {
                    if (!acc[item.category]) acc[item.category] = [];
                    acc[item.category].push(item);
                    return acc;
                }, {});

                for (const [category, items] of Object.entries(grouped)) {
                    html += `<div class="bg-slate-900 rounded-lg p-4"><h4 class="font-bold text-blue-400 mb-3">${category}</h4><div class="space-y-2">`;
                    for (const item of items) {
                        html += `
                            <div class="endpoint-card status-200 bg-slate-800/50 p-3 rounded flex justify-between items-center">
                                <code class="mono text-sm text-green-400">${item.path}</code>
                                <button onclick="showDetails('${item.path}')" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded">Детали</button>
                            </div>
                        `;
                    }
                    html += '</div></div>';
                }
                html += '</div></div>';
            }

            // Примеры ответов
            if (working.length > 0) {
                html += '<div class="bg-blue-900/10 border border-blue-800 rounded-xl p-6 mb-6"><h3 class="text-xl font-bold mb-4 text-blue-400">📊 ПРИМЕРЫ ОТВЕТОВ</h3>';
                
                const samples = working.slice(0, 5);
                for (const sample of samples) {
                    html += `
                        <div class="mb-4">
                            <div class="flex justify-between items-center mb-2">
                                <code class="mono text-sm text-blue-400">${sample.path}</code>
                                <span class="text-xs text-green-400">200 OK</span>
                            </div>
                            <pre class="mono text-xs bg-slate-900 p-3 rounded-lg overflow-auto max-h-40">${syntaxHighlight(JSON.stringify(sample.response, null, 2))}</pre>
                        </div>
                    `;
                }
                html += '</div>';
            }

            resultsDiv.innerHTML = html;
        }

        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) cls = 'json-key';
                    else cls = 'json-string';
                } else if (/true|false/.test(match)) cls = 'json-boolean';
                else if (/null/.test(match)) cls = 'json-null';
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        function showDetails(path) {
            alert('Детали эндпоинта: ' + path);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
    </script>
</body>
</html>
