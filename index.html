<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест подключения к МойСклад</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e293b; color: white; padding: 40px; max-width: 600px; margin: 0 auto; }
        .box { background: #334155; padding: 20px; border-radius: 8px; margin-top: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #475569; background: #0f172a; color: white; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        pre { background: #0f172a; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>

    <h2>🔌 Шаг 1: Проверка токена</h2>
    <p>Введите ваш токен (или логин:пароль). Мы запросим только название вашей организации.</p>
    
    <input type="text" id="token" placeholder="Вставьте токен или login:password">
    <button onclick="testConnection()">Проверить подключение</button>

    <div id="result" class="box" style="display: none;">
        <h3 id="statusTitle"></h3>
        <pre id="output"></pre>
    </div>

    <script>
        async function testConnection() {
            const tokenInput = document.getElementById('token').value.trim();
            const resultBox = document.getElementById('result');
            const statusTitle = document.getElementById('statusTitle');
            const output = document.getElementById('output');

            if (!tokenInput) {
                alert('Пожалуйста, введите токен!');
                return;
            }

            resultBox.style.display = 'block';
            statusTitle.textContent = '⏳ Загрузка...';
            statusTitle.className = '';
            output.textContent = 'Отправка запроса...';

            // Формируем заголовок авторизации согласно документации
            let authHeader = tokenInput;
            if (!tokenInput.startsWith('Basic ') && !tokenInput.startsWith('Bearer ')) {
                if (tokenInput.includes(':')) {
                    // Если это логин:пароль, кодируем в Base64
                    authHeader = 'Basic ' + btoa(unescape(encodeURIComponent(tokenInput)));
                } else {
                    // Иначе считаем, что это Bearer токен
                    authHeader = 'Bearer ' + tokenInput;
                }
            }

            try {
                // Запрашиваем САМУЮ простую и надежную сущность: организацию
                // Используем прокси, чтобы избежать CORS ошибок в браузере
                const proxyUrl = 'https://moysklad-proxy.helsinkyofficial.workers.dev';
                
                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: 'https://api.moysklad.ru/api/remap/1.2/entity/organization?limit=1',
                        headers: {
                            'Authorization': authHeader,
                            'Accept': 'application/json'
                        },
                        method: 'GET'
                    })
                });

                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    data = text; // Если это не JSON, выводим как есть
                }

                if (response.ok) {
                    statusTitle.textContent = '✅ УСПЕХ! Подключение работает.';
                    statusTitle.className = 'success';
                    
                    // Пытаемся вытащить имя организации для красоты
                    if (data.rows && data.rows.length > 0) {
                        output.textContent = `Ваша организация: ${data.rows[0].name}\n\nПолный ответ API:\n` + JSON.stringify(data, null, 2);
                    } else {
                        output.textContent = JSON.stringify(data, null, 2);
                    }
                } else {
                    statusTitle.textContent = `❌ ОШИБКА: Статус ${response.status}`;
                    statusTitle.className = 'error';
                    output.textContent = JSON.stringify(data, null, 2);
                }

            } catch (error) {
                statusTitle.textContent = '❌ ОШИБКА СЕТИ';
                statusTitle.className = 'error';
                output.textContent = error.message;
            }
        }
    </script>
</body>
</html>
