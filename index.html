<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Analyzer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4">

    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="glass p-8 max-w-md w-full text-center">
            <div class="spinner mx-auto mb-4"></div>
            <div id="loading-text" class="text-lg font-medium mb-1">Загрузка...</div>
            <div id="loading-details" class="text-sm text-gray-400 mb-4"></div>
            <div class="w-full bg-slate-800 rounded-full h-2">
                <div id="progress-bar" class="h-full bg-blue-500 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="glass p-8 max-w-md w-full">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">Profit Analyzer</h1>
        <input type="text" id="token-input" placeholder="Токен API МойСклад" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg mb-4 text-white focus:ring-2 focus:ring-blue-500 outline-none">
        
        <div class="flex gap-2 mb-6">
            <input type="date" id="date-from" class="flex-1 px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-white">
            <input type="date" id="date-to" class="flex-1 px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-white">
        </div>

        <button id="connect-btn" onclick="connectToMoySklad()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg mb-3 transition">
            Подключить и обновить данные
        </button>
        <button onclick="calculateOverview()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-lg transition">
            Рассчитать прибыль (точно)
        </button>
        <button onclick="Utils.clearCache(); location.reload();" class="w-full mt-4 text-xs text-red-400 hover:text-red-300">
            Очистить кэш и перезагрузить
        </button>
    </div>

    <div id="overview-results" class="hidden glass p-6 max-w-4xl w-full mt-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="text-center"><div class="text-gray-400 text-xs">Выручка</div><div id="metric-revenue" class="text-2xl font-bold text-green-400">0</div></div>
            <div class="text-center"><div class="text-gray-400 text-xs">Прибыль</div><div id="metric-profit" class="text-2xl font-bold text-blue-400">0</div></div>
            <div class="text-center"><div class="text-gray-400 text-xs">Маржа</div><div id="metric-margin" class="text-2xl font-bold text-yellow-400">0%</div></div>
        </div>
        <canvas id="overview-chart" height="100"></canvas>
    </div>

    <!-- Подключаем модули в строгом порядке -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
