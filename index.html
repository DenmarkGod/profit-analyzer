<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profit Analyzer Pro - ERP для ИП</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; }
        .nav-item { transition: all 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(59, 130, 246, 0.1); }
        .nav-item.active { background: rgba(59, 130, 246, 0.15); border-left-color: #3b82f6; color: #60a5fa; }
        .kpi-card { transition: all 0.3s; cursor: pointer; }
        .kpi-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-content { background: #1e293b; border-radius: 16px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .chart-container { position: relative; height: 300px; }
        input[type="date"] { color-scheme: dark; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #1e293b; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Боковое меню -->
    <aside class="w-64 bg-slate-900/80 border-r border-slate-800 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">Profit Analyzer</h1>
            <p class="text-xs text-gray-500 mt-1">Управленческий учет</p>
        </div>
        <nav class="flex-1 py-4 space-y-1 overflow-y-auto scrollbar-thin">
            <button onclick="switchView('dashboard')" id="nav-dashboard" class="nav-item active w-full text-left px-6 py-3 text-sm font-medium flex items-center gap-3">
                <span class="text-lg">📊</span> Главная
            </button>
            <button onclick="switchView('sales')" id="nav-sales" class="nav-item w-full text-left px-6 py-3 text-sm font-medium text-gray-400 flex items-center gap-3">
                <span class="text-lg">📈</span> Продажи
            </button>
            <button onclick="switchView('finance')" id="nav-finance" class="nav-item w-full text-left px-6 py-3 text-sm font-medium text-gray-400 flex items-center gap-3">
                <span class="text-lg">💰</span> Финансы
            </button>
            <button onclick="switchView('stock')" id="nav-stock" class="nav-item w-full text-left px-6 py-3 text-sm font-medium text-gray-400 flex items-center gap-3">
                <span class="text-lg">📦</span> Товары и склад
            </button>
            <button onclick="switchView('clients')" id="nav-clients" class="nav-item w-full text-left px-6 py-3 text-sm font-medium text-gray-400 flex items-center gap-3">
                <span class="text-lg">👥</span> Клиенты
            </button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="showConnectionModal()" class="w-full text-xs text-blue-400 hover:text-blue-300 flex items-center justify-center gap-2">
                <span>🔌</span> Подключение к API
            </button>
        </div>
    </aside>

    <!-- Мобильное меню -->
    <div class="md:hidden fixed bottom-0 w-full bg-slate-900/95 border-t border-slate-800 flex justify-around p-2 z-50 overflow-x-auto backdrop-blur-md">
        <button onclick="switchView('dashboard')" class="flex flex-col items-center p-2 text-blue-400 text-xs min-w-[60px]"><span class="text-lg">📊</span>Главная</button>
        <button onclick="switchView('sales')" class="flex flex-col items-center p-2 text-gray-400 text-xs min-w-[60px]"><span class="text-lg">📈</span>Продажи</button>
        <button onclick="switchView('finance')" class="flex flex-col items-center p-2 text-gray-400 text-xs min-w-[60px]"><span class="text-lg">💰</span>Финансы</button>
        <button onclick="switchView('stock')" class="flex flex-col items-center p-2 text-gray-400 text-xs min-w-[60px]"><span class="text-lg">📦</span>Склад</button>
    </div>

    <!-- Основной контент -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <div class="bg-slate-900/50 border-b border-slate-800 p-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-3">
                    <h2 id="page-title" class="text-2xl font-bold">Главная</h2>
                    <span class="text-xs text-gray-500">Обновлено: <span id="last-update">-</span></span>
                </div>
                <div class="flex items-center gap-3 flex-wrap">
                    <div class="flex gap-2">
                        <button onclick="setPeriod('today')" class="period-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-slate-800 hover:bg-slate-700 transition">Сегодня</button>
                        <button onclick="setPeriod('week')" class="period-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-blue-600 text-white transition">Неделя</button>
                        <button onclick="setPeriod('month')" class="period-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-slate-800 hover:bg-slate-700 transition">Месяц</button>
                    </div>
                    <div class="flex gap-2">
                        <input type="date" id="date-from" class="px-3 py-1.5 text-xs bg-slate-800 border border-slate-700 rounded-lg">
                        <span class="text-gray-500">—</span>
                        <input type="date" id="date-to" class="px-3 py-1.5 text-xs bg-slate-800 border border-slate-700 rounded-lg">
                    </div>
                    <button onclick="loadCurrentView()" class="px-4 py-1.5 text-xs font-medium bg-blue-600 hover:bg-blue-700 rounded-lg transition flex items-center gap-2">
                        <span>🔄</span> Обновить
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 scrollbar-thin">
            <!-- ГЛАВНАЯ СТРАНИЦА -->
            <div id="view-dashboard" class="view-section space-y-6">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="kpi-card glass p-6" onclick="showRevenueDetails()">
                        <div class="text-xs text-gray-400 mb-2 uppercase tracking-wider">Выручка</div>
                        <div id="kpi-revenue" class="text-2xl font-bold text-green-400">0</div>
                    </div>
                    <div class="kpi-card glass p-6" onclick="showProfitDetails()">
                        <div class="text-xs text-gray-400 mb-2 uppercase tracking-wider">Прибыль</div>
                        <div id="kpi-profit" class="text-2xl font-bold text-blue-400">0</div>
                    </div>
                    <div class="kpi-card glass p-6" onclick="showChecksDetails()">
                        <div class="text-xs text-gray-400 mb-2 uppercase tracking-wider">Чеки</div>
                        <div id="kpi-checks" class="text-2xl font-bold text-purple-400">0</div>
                    </div>
                    <div class="kpi-card glass p-6" onclick="showAvgCheckDetails()">
                        <div class="text-xs text-gray-400 mb-2 uppercase tracking-wider">Средний чек</div>
                        <div id="kpi-avg-check" class="text-2xl font-bold text-yellow-400">0</div>
                    </div>
                </div>

                <div class="glass p-6">
                    <h3 class="text-lg font-bold mb-4">Динамика выручки и прибыли</h3>
                    <div class="chart-container">
                        <canvas id="main-chart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Заглушки для других разделов -->
            <div id="view-sales" class="view-section hidden"><div class="glass p-8 text-center"><h2 class="text-2xl font-bold mb-4">📈 Продажи</h2><p class="text-gray-400">В разработке</p></div></div>
            <div id="view-finance" class="view-section hidden"><div class="glass p-8 text-center"><h2 class="text-2xl font-bold mb-4">💰 Финансы</h2><p class="text-gray-400">В разработке</p></div></div>
            <div id="view-stock" class="view-section hidden"><div class="glass p-8 text-center"><h2 class="text-2xl font-bold mb-4">📦 Склад</h2><p class="text-gray-400">В разработке</p></div></div>
            <div id="view-clients" class="view-section hidden"><div class="glass p-8 text-center"><h2 class="text-2xl font-bold mb-4">👥 Клиенты</h2><p class="text-gray-400">В разработке</p></div></div>
        </div>
    </main>

    <!-- Модальное окно подключения -->
    <div id="connection-modal" class="modal-overlay hidden">
        <div class="modal-content p-6 max-w-md">
            <h3 class="text-xl font-bold mb-4">Подключение к API</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Токен или логин:пароль</label>
                    <input type="text" id="api-token" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white" placeholder="Введите данные">
                </div>
                <button onclick="saveToken()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">Сохранить</button>
                <button onclick="closeConnectionModal()" class="w-full text-gray-400 hover:text-white text-sm">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно деталей -->
    <div id="details-modal" class="modal-overlay hidden">
        <div class="modal-content p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 id="details-title" class="text-2xl font-bold">Детали</h2>
                <button onclick="closeDetailsModal()" class="text-gray-400 hover:text-white text-3xl leading-none">&times;</button>
            </div>
            <div id="details-content"></div>
        </div>
    </div>

    <script>
        const PROXY_URL = 'https://moysklad-proxy.helsinkyofficial.workers.dev';
        let currentView = 'dashboard';
        let charts = {};
        let apiToken = localStorage.getItem('moysklad_token') || '';
        let dashboardData = {};

        function formatMoney(amount) {
            return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(amount || 0);
        }
        function formatNumber(num) {
            return new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 0 }).format(num || 0);
        }

        function getPeriodDates(period) {
            const now = new Date();
            let from, to;
            switch(period) {
                case 'today': from = to = now; break;
                case 'week': to = new Date(); from = new Date(now.setDate(now.getDate() - 7)); break;
                case 'month': to = new Date(); from = new Date(now.setMonth(now.getMonth() - 1)); break;
            }
            return { from: from.toISOString().split('T')[0], to: to.toISOString().split('T')[0] };
        }

        function setPeriod(period) {
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-slate-800');
            });
            event.target.classList.remove('bg-slate-800');
            event.target.classList.add('bg-blue-600', 'text-white');
            const dates = getPeriodDates(period);
            document.getElementById('date-from').value = dates.from;
            document.getElementById('date-to').value = dates.to;
            if (apiToken) loadCurrentView();
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById('view-' + view).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
                el.classList.add('text-gray-400');
            });
            document.getElementById('nav-' + view).classList.add('active');
            document.getElementById('nav-' + view).classList.remove('text-gray-400');
            
            const titles = { 'dashboard': 'Главная', 'sales': 'Продажи', 'finance': 'Финансы', 'stock': 'Склад', 'clients': 'Клиенты' };
            document.getElementById('page-title').textContent = titles[view] || 'Главная';
            
            if (apiToken) loadCurrentView();
        }

        function showConnectionModal() {
            document.getElementById('connection-modal').classList.remove('hidden');
            if (apiToken) document.getElementById('api-token').value = apiToken;
        }
        function closeConnectionModal() { document.getElementById('connection-modal').classList.add('hidden'); }
        
        function saveToken() {
            apiToken = document.getElementById('api-token').value.trim();
            localStorage.setItem('moysklad_token', apiToken);
            closeConnectionModal();
            if (apiToken) loadCurrentView();
        }

        // ИСПРАВЛЕНО: Добавлен критически важный заголовок Accept, требуемый документацией МойСклад
        function getAuthHeaders() {
            let authValue = apiToken;
            if (!apiToken.startsWith("Basic ") && !apiToken.startsWith("Bearer ")) {
                authValue = apiToken.includes(":") ? "Basic " + btoa(unescape(encodeURIComponent(apiToken))) : "Bearer " + apiToken;
            }
            return { 
                "Authorization": authValue, 
                "Accept": "application/json;charset=utf-8", 
                "Content-Type": "application/json" 
            };
        }

        async function fetchWithRetry(url, options, retries = 3) {
            try {
                const separator = url.includes('?') ? '&' : '?';
                return await fetch(url + separator + '_t=' + Date.now(), options);
            } catch (error) {
                if (retries > 0) {
                    await new Promise(r => setTimeout(r, 2500));
                    return fetchWithRetry(url, options, retries - 1);
                }
                throw new Error('Сеть сбрасывает соединение');
            }
        }

        async function proxyFetch(targetUrl, headers) {
            const response = await fetchWithRetry(PROXY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: targetUrl, headers: headers, method: 'GET' })
            });
            if (response.status === 429) throw new Error('Лимит запросов (429). Подождите 1 минуту.');
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error('Ошибка API ' + response.status + ': ' + errorText);
            }
            return response;
        }

        async function loadCurrentView() {
            if (!apiToken) { showConnectionModal(); return; }
            
            // Показываем простую индикацию загрузки на кнопке
            const btn = document.querySelector('button[onclick="loadCurrentView()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> Загрузка...';
            btn.disabled = true;

            try {
                const headers = getAuthHeaders();
                const dateFrom = document.getElementById('date-from').value;
                const dateTo = document.getElementById('date-to').value;
                
                // Формат даты строго по документации: YYYY-MM-DD HH:MM:SS
                const momentFrom = `${dateFrom} 00:00:00`;
                const momentTo = `${dateTo} 23:59:59`;

                if (currentView === 'dashboard') {
                    // Параллельная загрузка для скорости
                    const [salesData, profitData] = await Promise.all([
                        proxyFetch(`https://api.moysklad.ru/api/remap/1.2/report/sales/plotseries?momentFrom=${encodeURIComponent(momentFrom)}&momentTo=${encodeURIComponent(momentTo)}&interval=day`, headers),
                        proxyFetch(`https://api.moysklad.ru/api/remap/1.2/report/profit/byproduct?momentFrom=${encodeURIComponent(momentFrom)}&momentTo=${encodeURIComponent(momentTo)}&limit=1000`, headers)
                    ]);

                    const salesResult = await salesData.json();
                    const profitResult = await profitData.json();

                    dashboardData = { sales: salesResult, profit: profitResult, dateFrom, dateTo, momentFrom, momentTo };

                    const totalRevenue = salesResult.series.reduce((sum, s) => sum + (s.sum || 0) / 100, 0);
                    const totalChecks = salesResult.series.reduce((sum, s) => sum + (s.quantity || 0), 0);
                    const avgCheck = totalChecks > 0 ? totalRevenue / totalChecks : 0;
                    const totalProfit = profitResult.rows.reduce((sum, r) => sum + (r.profit || 0) / 100, 0);

                    document.getElementById('kpi-revenue').textContent = formatMoney(totalRevenue);
                    document.getElementById('kpi-profit').textContent = formatMoney(totalProfit);
                    document.getElementById('kpi-checks').textContent = formatNumber(totalChecks);
                    document.getElementById('kpi-avg-check').textContent = formatMoney(avgCheck);

                    updateMainChart(salesResult);
                }
                
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ru-RU');
            } catch (error) {
                alert('Ошибка: ' + error.message);
                console.error(error);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function updateMainChart(salesData) {
            const ctx = document.getElementById('main-chart');
            if (charts['main']) charts['main'].destroy();
            charts['main'] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: salesData.series.map(s => s.date.split(' ')[0].slice(5)),
                    datasets: [{
                        label: 'Выручка',
                        data: salesData.series.map(s => (s.sum || 0) / 100),
                        borderColor: '#4ade80',
                        backgroundColor: 'rgba(74, 222, 128, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8' } } },
                    scales: {
                        y: { ticks: { callback: v => formatMoney(v), color: '#64748b' }, grid: { color: '#1e293b' } },
                        x: { ticks: { color: '#64748b' }, grid: { display: false } }
                    }
                }
            });
        }

        function showRevenueDetails() {
            const html = `
                <div class="space-y-4">
                    <div class="bg-slate-800 p-4 rounded-lg border-l-4 border-green-500">
                        <div class="text-sm text-gray-400">Общая выручка</div>
                        <div class="text-3xl font-bold text-green-400">${formatMoney(dashboardData.sales.series.reduce((sum, s) => sum + (s.sum || 0) / 100, 0))}</div>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-lg">
                        <h4 class="font-bold mb-3">Выручка по дням</h4>
                        <div class="space-y-2 max-h-[50vh] overflow-y-auto">
                            ${dashboardData.sales.series.map(s => `
                                <div class="flex justify-between items-center p-2 bg-slate-900 rounded">
                                    <span class="text-sm">${s.date.split(' ')[0]}</span>
                                    <span class="font-bold text-green-400">${formatMoney((s.sum || 0) / 100)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            openDetailsModal('Детализация выручки', html);
        }

        function showProfitDetails() {
            const html = `
                <div class="space-y-4">
                    <div class="bg-slate-800 p-4 rounded-lg">
                        <h4 class="font-bold mb-3">Топ-10 товаров по прибыли</h4>
                        <div class="space-y-2 max-h-[60vh] overflow-y-auto">
                            ${dashboardData.profit.rows
                                .sort((a, b) => (b.profit || 0) - (a.profit || 0))
                                .slice(0, 10)
                                .map(p => `
                                    <div class="flex justify-between items-center p-3 bg-slate-900 rounded">
                                        <span class="text-sm font-medium">${p.assortment?.name || 'Без названия'}</span>
                                        <span class="font-bold text-blue-400">${formatMoney((p.profit || 0) / 100)}</span>
                                    </div>
                                `).join('')}
                        </div>
                    </div>
                </div>
            `;
            openDetailsModal('Детализация прибыли', html);
        }

        // =====================================================================
        // ИСПРАВЛЕННАЯ ФУНКЦИЯ: Получение списка чеков за период
        // Согласно документации, для документов используется filter=moment>=...;moment<=...
        // =====================================================================
        async function showChecksDetails() {
            openDetailsModal('Загрузка чеков...', '<div class="text-center py-8"><div class="spinner mx-auto mb-4"></div>Загрузка списка чеков...</div>');
            
            try {
                const headers = getAuthHeaders();
                const momentFrom = dashboardData.momentFrom;
                const momentTo = dashboardData.momentTo;

                // ИСПРАВЛЕНИЕ: Правильный синтаксис фильтрации документов по дате + только проведенные (applicable=true)
                const filter = `moment>=${encodeURIComponent(momentFrom)};moment<=${encodeURIComponent(momentTo)};applicable=true`;
                const url = `https://api.moysklad.ru/api/remap/1.2/entity/retaildemand?filter=${filter}&limit=1000&order=moment,desc`;
                
                console.log('Запрос чеков:', url); // Для отладки в консоли браузера
                
                const response = await proxyFetch(url, headers);
                const data = await response.json();
                const checks = data.rows || [];

                const totalSum = checks.reduce((sum, c) => sum + (c.sum || 0) / 100, 0);

                const html = `
                    <div class="space-y-4">
                        <div class="bg-slate-800 p-4 rounded-lg border-l-4 border-purple-500 flex justify-between items-center">
                            <div>
                                <div class="text-sm text-gray-400">Всего чеков за период</div>
                                <div class="text-2xl font-bold text-purple-400">${checks.length}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-sm text-gray-400">На сумму</div>
                                <div class="text-xl font-bold text-green-400">${formatMoney(totalSum)}</div>
                            </div>
                        </div>
                        
                        <div class="space-y-2 max-h-[60vh] overflow-y-auto pr-2">
                            ${checks.length === 0 ? '<div class="text-center text-gray-500 py-8">Проведенных чеков за этот период не найдено</div>' : ''}
                            ${checks.map(c => {
                                const sum = (c.sum || 0) / 100;
                                const date = c.moment ? new Date(c.moment).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-';
                                return `
                                    <div class="bg-slate-800 p-4 rounded-lg cursor-pointer hover:bg-slate-700 transition border border-transparent hover:border-blue-500/50" onclick="loadCheckDetails('${c.id}', '${c.name || 'Чек'}', ${sum}, '${date}')">
                                        <div class="flex justify-between items-center mb-2">
                                            <span class="font-bold text-lg">${c.name || 'Чек'}</span>
                                            <span class="font-bold text-green-400 text-lg">${formatMoney(sum)}</span>
                                        </div>
                                        <div class="flex justify-between items-center text-xs text-gray-400">
                                            <span>${date}</span>
                                            <span class="text-blue-400 flex items-center gap-1">Открыть товары <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg></span>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
                openDetailsModal(`Список чеков (${checks.length})`, html);
            } catch (error) {
                openDetailsModal('Ошибка', `<div class="text-red-400 text-center py-4">Не удалось загрузить чеки:<br><br>${error.message}</div>`);
                console.error('Ошибка загрузки чеков:', error);
            }
        }

        // =====================================================================
        // ИСПРАВЛЕННАЯ ФУНКЦИЯ: Детализация конкретного чека с товарами
        // Используем expand=positions.assortment для получения названий товаров
        // =====================================================================
        async function loadCheckDetails(checkId, checkName, checkSum, checkMoment) {
            const modal = document.getElementById('details-modal');
            const title = document.getElementById('details-title');
            const content = document.getElementById('details-content');

            title.textContent = 'Загрузка товаров...';
            content.innerHTML = '<div class="text-center py-8"><div class="spinner mx-auto mb-4"></div>Загрузка позиций чека...</div>';
            
            try {
                const headers = getAuthHeaders();
                // ИСПРАВЛЕНИЕ: expand=positions.assortment гарантирует возврат объектов товаров с именами
                const url = `https://api.moysklad.ru/api/remap/1.2/entity/retaildemand/${checkId}?expand=positions.assortment`;
                
                console.log('Запрос деталей чека:', url);
                
                const response = await proxyFetch(url, headers);
                const checkData = await response.json();
                const positions = checkData.positions?.rows || [];

                let totalCalculated = 0;
                const itemsHtml = positions.map(p => {
                    // Безопасное получение имени из вложенного объекта assortment
                    const productName = p.assortment?.name || 'Товар без названия';
                    const quantity = p.quantity || 0;
                    const price = (p.price || 0) / 100;
                    const sum = (p.sum || 0) / 100;
                    totalCalculated += sum;

                    return `
                        <div class="flex justify-between items-start p-3 bg-slate-900 rounded mb-2 border border-slate-800">
                            <div class="flex-1 pr-4">
                                <div class="font-medium text-white">${productName}</div>
                                <div class="text-sm text-gray-400 mt-1">
                                    ${quantity} шт × ${formatMoney(price)}
                                </div>
                            </div>
                            <div class="text-right flex-shrink-0">
                                <div class="font-bold text-green-400">${formatMoney(sum)}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                const html = `
                    <div class="space-y-4">
                        <div class="bg-slate-800 p-4 rounded-lg border-l-4 border-green-500">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="text-sm text-gray-400">Чек</div>
                                    <div class="text-xl font-bold text-white">${checkName}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-sm text-gray-400">Сумма</div>
                                    <div class="text-2xl font-bold text-green-400">${formatMoney(checkSum)}</div>
                                </div>
                            </div>
                            <div class="text-xs text-gray-500 mt-2 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                ${checkMoment}
                            </div>
                        </div>

                        <div class="bg-slate-800 p-4 rounded-lg">
                            <h4 class="font-bold mb-3 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                                Товары в чеке (${positions.length})
                            </h4>
                            <div class="space-y-2 max-h-[50vh] overflow-y-auto pr-2">
                                ${itemsHtml || '<div class="text-gray-500 text-center py-4">В чеке нет позиций</div>'}
                            </div>
                            ${positions.length > 0 ? `
                                <div class="mt-4 pt-4 border-t border-slate-700 flex justify-between items-center">
                                    <span class="font-bold text-gray-300">Итого по позициям:</span>
                                    <span class="font-bold text-green-400 text-xl">${formatMoney(totalCalculated)}</span>
                                </div>
                            ` : ''}
                        </div>

                        <button onclick="showChecksDetails()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-lg transition flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                            Вернуться к списку чеков
                        </button>
                    </div>
                `;
                title.textContent = `Детализация чека: ${checkName}`;
                content.innerHTML = html;
            } catch (error) {
                title.textContent = 'Ошибка';
                content.innerHTML = `<div class="text-red-400 text-center py-4">Не удалось загрузить позиции:<br><br>${error.message}</div>
                <button onclick="showChecksDetails()" class="mt-4 w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2 rounded-lg transition">Назад к списку</button>`;
                console.error('Ошибка загрузки деталей чека:', error);
            }
        }

        function showAvgCheckDetails() {
            const totalRevenue = dashboardData.sales.series.reduce((sum, s) => sum + (s.sum || 0) / 100, 0);
            const totalChecks = dashboardData.sales.series.reduce((sum, s) => sum + (s.quantity || 0), 0);
            const avgCheck = totalChecks > 0 ? totalRevenue / totalChecks : 0;

            const html = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-800 p-4 rounded-lg border-l-4 border-yellow-500">
                            <div class="text-sm text-gray-400">Средний чек</div>
                            <div class="text-2xl font-bold text-yellow-400">${formatMoney(avgCheck)}</div>
                        </div>
                        <div class="bg-slate-800 p-4 rounded-lg border-l-4 border-purple-500">
                            <div class="text-sm text-gray-400">Всего чеков</div>
                            <div class="text-2xl font-bold text-purple-400">${formatNumber(totalChecks)}</div>
                        </div>
                    </div>
                </div>
            `;
            openDetailsModal('Детализация среднего чека', html);
        }

        function openDetailsModal(title, content) {
            document.getElementById('details-title').textContent = title;
            document.getElementById('details-content').innerHTML = content;
            document.getElementById('details-modal').classList.remove('hidden');
        }

        function closeDetailsModal() {
            document.getElementById('details-modal').classList.add('hidden');
        }

        window.addEventListener('load', () => {
            const dates = getPeriodDates('week');
            document.getElementById('date-from').value = dates.from;
            document.getElementById('date-to').value = dates.to;
            if (apiToken) loadCurrentView();
        });
    </script>
</body>
</html>
