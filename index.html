<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Analyzer • Главная</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        body { background: linear-gradient(180deg, #0f172a 0%, #020617 100%); }
        .glass { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(148, 163, 184, 0.12); }
        .kpi-card:hover { transform: translateY(-8px); }
    </style>
</head>
<body>
    <div class="flex h-screen">
        <!-- Sidebar (оставил как был) -->
        <div class="w-72 glass border-r border-slate-700 flex flex-col">
            <div class="p-6 border-b border-slate-700">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-2xl">💰</div>
                    <h1 class="text-2xl font-bold">Profit Analyzer</h1>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-1 text-slate-300">
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-slate-800 rounded-2xl text-white">
                    <i class="fa-solid fa-house"></i><span>Главная</span>
                </a>
                <!-- другие ссылки -->
            </nav>
        </div>

        <!-- Main -->
        <div class="flex-1 overflow-auto p-8">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between mb-10">
                    <h2 class="text-4xl font-bold">Обзор бизнеса</h2>
                    <button onclick="refreshAll()" class="px-6 py-3 bg-emerald-500 rounded-3xl flex items-center gap-2 hover:bg-emerald-600">
                        <i class="fa-solid fa-rotate"></i> Обновить данные
                    </button>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10" id="kpi-grid"></div>

                <div class="grid grid-cols-1 xl:grid-cols-5 gap-6">
                    <div class="xl:col-span-3 glass rounded-3xl p-8">
                        <h3 class="text-xl font-semibold mb-6">Динамика</h3>
                        <div class="h-96"><canvas id="mainChart"></canvas></div>
                    </div>
                    <div class="xl:col-span-2 glass rounded-3xl p-8">
                        <h3 class="text-xl font-semibold mb-6">Топ товаров</h3>
                        <div id="top-products"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="glass max-w-md w-full rounded-3xl p-10">
            <h3 class="text-2xl font-bold mb-4">Подключение</h3>
            <input id="token-input" type="text" placeholder="Access Token" 
                   class="w-full p-5 bg-slate-900 border border-slate-600 rounded-2xl mb-6">
            <button onclick="saveAndConnect()" 
                    class="w-full py-4 bg-emerald-500 rounded-2xl font-semibold">Сохранить и загрузить</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://api.moysklad.ru/api/remap/1.2";
        let token = localStorage.getItem("moysklad_token") || "";
        let mainChart = null;

        function formatMoney(n) {
            return new Intl.NumberFormat('ru-RU').format(Math.round(n || 0)) + " ₽";
        }

        async function moyskladGet(endpoint, params = {}) {
            if (!token) {
                document.getElementById("modal").classList.remove("hidden");
                return null;
            }

            const url = new URL(`${API_BASE}${endpoint}`);
            Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));

            try {
                const res = await fetch(url, {
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Accept": "application/json"
                    }
                });
                if (!res.ok) throw new Error(res.status);
                return await res.json();
            } catch (e) {
                console.error("API Error:", e);
                return null;
            }
        }

        // ==================== ЗАГРУЗКА ДАННЫХ ====================
        async function loadKPIs() {
            const grid = document.getElementById("kpi-grid");
            grid.innerHTML = `<div class="col-span-4 text-center py-12">Загрузка данных...</div>`;

            // Пример: получаем последние отгрузки (demand) за период
            const demands = await moyskladGet("/entity/demand", {
                limit: 100,
                order: "moment,desc",
                expand: "positions"
            });

            let totalRevenue = 0;
            if (demands && demands.rows) {
                totalRevenue = demands.rows.reduce((sum, d) => sum + (d.sum || 0), 0);
            }

            grid.innerHTML = `
                <div class="glass kpi-card rounded-3xl p-8">
                    <div class="text-emerald-400 text-sm">Выручка</div>
                    <div class="text-5xl font-bold mt-3">${formatMoney(totalRevenue)}</div>
                </div>
                <!-- Добавь другие KPI: прибыль, кол-во чеков, средний чек и т.д. -->
            `;
        }

        async function loadTopProducts() {
            const container = document.getElementById("top-products");
            const assortment = await moyskladGet("/entity/assortment", { limit: 50 });

            if (!assortment || !assortment.rows) {
                container.innerHTML = "<p class='text-slate-400'>Нет данных</p>";
                return;
            }

            let html = "";
            assortment.rows.slice(0, 5).forEach(item => {
                html += `
                    <div class="flex justify-between items-center">
                        <div>${item.name}</div>
                        <div class="font-medium">${formatMoney(item.salePrices?.[0]?.value || 0)}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderMainChart() {
            const ctx = document.getElementById("mainChart");
            if (mainChart) mainChart.destroy();

            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'],
                    datasets: [{
                        label: 'Выручка',
                        data: [32000, 41000, 28000, 52000, 39000, 47000, 61000],
                        borderColor: '#10b981',
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        async function refreshAll() {
            await Promise.all([loadKPIs(), loadTopProducts()]);
            renderMainChart();
        }

        function saveAndConnect() {
            token = document.getElementById("token-input").value.trim();
            if (token) {
                localStorage.setItem("moysklad_token", token);
                document.getElementById("modal").classList.add("hidden");
                refreshAll();
            }
        }

        // Старт
        window.onload = () => {
            if (token) refreshAll();
            else document.getElementById("modal").classList.remove("hidden");
        };
    </script>
</body>
</html>
